name: Report Quality Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  scope-filter-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Validate report scope filters
        run: bash scripts/ci/check_report_scope_filters.sh
